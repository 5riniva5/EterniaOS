<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EterniaOS - Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top System Bar -->
    <div class="menu-bar">
        <div class="logo">⚡ ETERNIAOS // ARCADE HUB</div>
        <div class="status-chip" id="system-clock">SYSTEM ONLINE</div>
    </div>

    <!-- Desktop Workspace & App Icons -->
    <div class="desktop" id="desktop">
        <div class="desktop-icon" onclick="openMusicPlayer()">
            <span style="font-size: 1.8rem;">🎵</span>
            <span>Jukebox</span>
        </div>
        <div class="desktop-icon" onclick="openTaskManager()">
            <span style="font-size: 1.8rem;">📋</span>
            <span>Quest Log</span>
        </div>
        <div class="desktop-icon" onclick="openCalculator()">
            <span style="font-size: 1.8rem;">🧮</span>
            <span>Calculator</span>
        </div>
        <div class="desktop-icon" onclick="openNotepad()">
            <span style="font-size: 1.8rem;">📝</span>
            <span>Notepad</span>
        </div>
        <div class="desktop-icon" onclick="openGame()">
            <span style="font-size: 1.8rem;">🕹️</span>
            <span>Minigame</span>
        </div>
        <div class="desktop-icon" onclick="openGallery()">
            <span style="font-size: 1.8rem;">🖼️</span>
            <span>Gallery</span>
        </div>
        <div class="desktop-icon" onclick="openMonitor()">
            <span style="font-size: 1.8rem;">📊</span>
            <span>Monitor</span>
        </div>
    </div>

    <!-- Script Injections -->
    <script src="app.js"></script>
    <script src="calculator.js"></script>
    <script src="clock.js"></script>
    <script src="gallery.js"></script>
    <script src="game.js"></script>
    <script src="monitor.js"></script>
    <script src="music.js"></script>
    <script src="notepad.js"></script>
    <script src="tasks.js"></script>
</body>
</html>
