<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castle Grayskull WebOS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="boot-screen" id="bootScreen">
    <div class="boot-frame">
      <div class="boot-sword">
        <img src="https://www.he-man.org/wp-content/uploads/2026/04/671136082_18432734080183234_8974992315151242639_n-1024x1024.jpg" alt="Sword of Power" />
      </div>
      <h1>By the power of Grayskull... the web has the power!</h1>
      <div class="boot-visual"></div>
      <div class="boot-flare"></div>
    </div>
  </div>

  <div class="menu-bar">
    <div class="menu-left">
      <div class="logo">🏰 Castle Grayskull</div>
      <div class="menu-item">System</div>
      <div class="menu-item">Display</div>
      <div class="menu-item">Themes</div>
    </div>
    <div class="menu-right">
      <div class="status-chip">⚡ Eternia Ready</div>
      <div class="status-chip" id="clock">00:00 • 01 Jan</div>
    </div>
  </div>

  <div class="desktop" id="desktopArea">
    <div class="theme-widget" id="themeWidget">
      <div class="widget-title">Power of Grayskull</div>
      <p class="widget-description">Activate the lightning matrix to energize every open window and shake the webOS with mystic neon pulse.</p>
      <button class="widget-action" id="powerButton">Unleash Lightning</button>
    </div>
    <div id="windowContainer"></div>
  </div>

  <div class="dock" aria-label="App Dock">
    <button class="dock-item" data-app="devlogs" data-label="Devlogs">📜</button>
    <button class="dock-item" data-app="notepad" data-label="Notepad">📓</button>
    <button class="dock-item" data-app="terminal" data-label="Lore Terminal">⌨️</button>
    <button class="dock-item" data-app="theme" data-label="Theme">⚡</button>
  </div>

  <div id="power-drop"></div>
  <script src="app.js"></script>
</body>
</html>
